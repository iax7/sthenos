<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test de Rendimiento</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="bg-light text-dark">
    <form id="performance-test-form">
      <main id="screenshot-area" class="container py-5">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <header class="text-center mb-4">
              <h1 class="display-5 fw-bold mb-4">Test de Rendimiento</h1>

              <div class="card shadow-sm mb-4">
                <div class="card-body">
                  <h5 class="card-title mb-3">Información Personal</h5>
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="full-name" class="form-label fw-medium"
                        >Atleta</label
                      >
                      <input
                        type="text"
                        name="full-name"
                        id="full-name"
                        placeholder="Nombre"
                        class="form-control"
                      />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label fw-medium d-block mb-2"
                        >Género</label
                      >

                      <div class="btn-group" role="group" aria-label="Género">
                        <input
                          type="radio"
                          class="btn-check"
                          name="gender"
                          id="gender-m"
                          value="m"
                          autocomplete="off"
                          checked
                        />
                        <label class="btn btn-outline-secondary" for="gender-m"
                          >Masculino</label
                        >

                        <input
                          type="radio"
                          class="btn-check"
                          name="gender"
                          id="gender-f"
                          value="f"
                          autocomplete="off"
                        />
                        <label class="btn btn-outline-secondary" for="gender-f"
                          >Femenino</label
                        >
                      </div>
                    </div>
                    <div class="col-md-6">
                      <label for="age" class="form-label fw-medium">Edad</label>
                      <input
                        type="number"
                        id="age"
                        class="form-control"
                        placeholder="Años"
                        required
                      />
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <section id="reps_table" class="card shadow-sm mb-4">
              <div class="card-body">
                <h5 class="card-title mb-3 text-center">
                  Máximo de Repeticiones en 1 Minuto
                </h5>

                <div class="mb-3">
                  <label class="form-label fw-medium">Pull up</label>
                  <div class="row g-2">
                    <div class="col-6">
                      <input
                        type="number"
                        id="pullup-reps"
                        class="form-control"
                        placeholder="Reps"
                      />
                    </div>
                    <div class="col-6">
                      <select
                        id="pullup-version"
                        class="form-select"
                        aria-label="Versión de Pull up"
                      ></select>
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Push up</label>
                  <div class="row g-2">
                    <div class="col-6">
                      <input
                        type="number"
                        id="pushup-reps"
                        class="form-control"
                        placeholder="Reps"
                      />
                    </div>
                    <div class="col-6">
                      <select
                        id="pushup-version"
                        class="form-select"
                        aria-label="Versión de Push up"
                      ></select>
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">Squats</label>
                  <div class="row g-2">
                    <div class="col-6">
                      <input
                        type="number"
                        id="squats-reps"
                        class="form-control"
                        placeholder="Reps"
                      />
                    </div>
                    <div class="col-6">
                      <select
                        id="squats-version"
                        class="form-select"
                        aria-label="Versión de Squats"
                      ></select>
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label fw-medium">V-ups</label>
                  <div class="row g-2">
                    <div class="col-6">
                      <input
                        type="number"
                        id="vups-reps"
                        class="form-control"
                        placeholder="Reps"
                      />
                    </div>
                    <div class="col-6">
                      <select
                        id="vups-version"
                        class="form-select"
                        aria-label="Versión de V-ups"
                      ></select>
                    </div>
                  </div>
                </div>

                <div class="mb-0">
                  <label class="form-label fw-medium">Burpees</label>
                  <div class="row g-2">
                    <div class="col-6">
                      <input
                        type="number"
                        id="burpees-reps"
                        class="form-control"
                        placeholder="Reps"
                      />
                    </div>
                    <div class="col-6">
                      <select
                        id="burpees-version"
                        class="form-select"
                        aria-label="Versión de Burpees"
                      ></select>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section id="cooper-calculator" class="card shadow-sm">
              <div class="card-body">
                <h5 class="card-title mb-3 text-center">Test de Cooper</h5>

                <div class="row g-3">
                  <div class="col-12">
                    <label for="laps" class="form-label fw-medium"
                      >Vueltas</label
                    >
                    <input
                      type="number"
                      id="laps"
                      class="form-control"
                      placeholder="Número"
                      step="any"
                      required
                    />
                  </div>
                </div>
              </div>
            </section>

            <div class="text-center my-4">
              <button id="calculate" type="submit" class="btn btn-primary px-4">
                Calcular
              </button>
            </div>
          </div>
        </div>
      </main>
    </form>

    <!-- RESULTADOS MEJORADOS -->
    <section id="results-card" class="container my-5 d-none">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-lg border-0 overflow-hidden">
            <!-- Header del atleta con gradiente -->
            <div class="athlete-header">
              <h1 class="mb-2 fw-bold" id="result-name">Atleta</h1>
              <div class="personal-info">
                <div class="stats-badge">
                  <strong>Edad:</strong> <span id="result-age"></span> años
                </div>
                <div class="stats-badge">
                  <strong>Género:</strong>
                  <span id="result-gender" class="text-capitalize"></span>
                </div>
              </div>
              <p class="mt-3 mb-0 opacity-75" id="result-date"></p>
            </div>

            <div class="card-body p-4">
              <!-- Tabla de ejercicios mejorada -->
              <h3 class="text-center mb-4 text-primary">
                Repeticiones Máximas (1 minuto)
              </h3>

              <div class="results-table mb-4">
                <table class="table table-hover mb-0">
                  <thead class="table-header">
                    <tr>
                      <th class="py-3 px-4">Ejercicio</th>
                      <th class="py-3 text-center">Repeticiones</th>
                      <th class="py-3 text-center">Versión</th>
                    </tr>
                  </thead>
                  <tbody id="results-table-body" class="table-group-divider">
                    <!-- Se llena por JS -->
                  </tbody>
                </table>
              </div>

              <!-- Test de Cooper mejorado -->
              <div class="cooper-result-card text-center">
                <h3 class="mb-3">🏃‍♂️ Test de Cooper (12 minutos)</h3>
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="h4 mb-2">Distancia Recorrida</div>
                    <div class="h2 fw-bold" id="cooper-distance-result"></div>
                  </div>
                  <div class="col-md-6">
                    <div class="h4 mb-2">Nivel de Condición</div>
                    <div class="h2 fw-bold" id="cooper-result"></div>
                  </div>
                </div>
                <div class="row">
                  <div class="col">
                    <span id="vo2-max" class="h5 mt-8 d-none"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="text-center mt-3 mb-5 px-4 d-none" id="screenshot-wrapper">
      <button id="screenshot" class="btn btn-outline-dark btn-lg">
        📸 Descargar
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/cooper.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>
